# Render Infrastructure-as-Code for the extraaedge product-owner (platform) portal.
#
# This is a Vite SPA. Without an SPA rewrite, deep links and hard reloads
# (e.g. /login, /tenants) hit Render's static server, find no file at that
# path, and return 404. The rewrite below sends any non-file path to
# index.html so client-side routing survives a reload — the app never 404s /
# crashes on refresh. Real build assets under /assets/* are served directly
# (and thus keep their correct module-script MIME type).
#
# NOTE: render.yaml applies to services created via a Blueprint, or when synced
# in the dashboard. An EXISTING static service's dashboard settings take
# precedence — set its Build Command to `npm install && npm run build`, Publish
# Directory to `dist`, and add the SPA rewrite (Redirect/Rewrite rule:
# Source `/*` → Destination `/index.html`, action Rewrite) to match this file.
services:
  - type: web
    name: extraaedge-product-owner
    runtime: static
    branch: main
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # SPA deep-link support: any path that isn't a real file in dist/ is
    # rewritten to index.html so client-side routes survive a hard reload.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # Long-cache the content-hashed build assets (filenames change per build).
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
