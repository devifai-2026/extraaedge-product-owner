# Load all JSON dashboards from /var/lib/grafana/dashboards at startup.
apiVersion: 1

providers:
  - name: ExtraaEdge
    orgId: 1
    folder: ExtraaEdge
    type: file
    disableDeletion: true
    allowUiUpdates: false
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
